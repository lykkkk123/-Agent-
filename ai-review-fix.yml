name: AI Review Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-review-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI review and auto-fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.1
        run: |
          python agent.py --base origin/${{ github.base_ref }} --max-patch-lines 500

      - name: Commit AI fixes
        run: |
          if ! git diff --quiet; then
            git config user.name "ai-review-agent"
            git config user.email "ai-review-agent@example.com"
            git add .
            git commit -m "chore: apply AI code review fixes"
            git push
          else
            echo "No AI fixes to commit."
          fi

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-report
          path: |
            .agent.review.json
            .agent.patch
          if-no-files-found: ignore
